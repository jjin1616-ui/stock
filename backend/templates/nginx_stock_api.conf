server {
    listen 80;
    server_name __SERVER_NAME__;

    client_max_body_size 20m;

    # Static APK hosting (side-load distribution).
    # Served directly by nginx (no auth) so users can always fetch:
    #   /apk/app-latest.apk
    #   /apk/app-latest.apk.sha256
    #   /apk/latest.json
    #
    # Additionally, /apk/download is proxied to the backend to redirect users
    # to the latest *versioned* filename (avoids app-latest (2).apk, (3).apk).
    location = /apk/download {
        proxy_pass http://127.0.0.1:8000/apk/download;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }
    location = /apk/install {
        proxy_pass http://127.0.0.1:8000/apk/install;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }
    # Backward compatible: older apps link to /apk/app-latest.apk.
    # Redirect it so Android saves a versioned filename via Content-Disposition.
    location = /apk/app-latest.apk {
        return 302 /apk/download;
    }
    location /apk/ {
        alias /var/www/stock/apk/;
        autoindex on;
        add_header Cache-Control "no-store";
        # Note: defining `types` inside a location overrides the global mapping.
        # Keep JSON/text types so Retrofit clients can parse `latest.json` cleanly.
        types {
            application/vnd.android.package-archive apk;
            application/json json;
            text/plain sha256;
        }
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 15s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }
}

name: 배포

on:
  workflow_dispatch:
    inputs:
      target:
        description: "배포 대상"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - server
          - apk

jobs:
  server:
    name: 서버 배포
    if: inputs.target == 'all' || inputs.target == 'server'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 서버 코드 전송
        run: |
          rsync -avz --exclude='__pycache__' --exclude='*.pyc' --exclude='*.db' --exclude='*.db-*' --exclude='.venv' --exclude='results/' --exclude='.localdata/' -e "ssh -i ~/.ssh/ec2.pem" backend/app/ ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/stock/backend/app/
          rsync -avz --exclude='__pycache__' --exclude='*.pyc' -e "ssh -i ~/.ssh/ec2.pem" backend/engine/ ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/stock/backend/engine/
          scp -i ~/.ssh/ec2.pem backend/main.py backend/run.py backend/requirements.txt ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/stock/backend/

      - name: 서버 재시작
        run: |
          ssh -i ~/.ssh/ec2.pem ubuntu@${{ secrets.EC2_HOST }} 'sudo systemctl restart stock-backend.service && sleep 3 && sudo systemctl is-active stock-backend.service'

  apk:
    name: APK 빌드 및 배포
    if: inputs.target == 'all' || inputs.target == 'apk'
    needs: server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: google-services.json 복원
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > app/google-services.json
          fi

      - name: APK 빌드
        run: |
          chmod +x gradlew
          ./gradlew :app:exportDebugApk --no-daemon
        env:
          ALLOW_FCM_DISABLED: "true"

      - name: APK 업로드
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          APK_PATH=$(ls -t app/build/outputs/apk/export/debug/mstock_*.apk | head -n 1)
          APK_BASE=$(basename "$APK_PATH")

          LABEL=$(python3 -c "import re; m=re.match(r'^mstock_v[^()]+\((\d+)\)_(.+)_(debug|release)\.apk$','$APK_BASE'); print(m.group(2))")
          PUBLISHED="james._${LABEL}.apk"

          scp -i ~/.ssh/ec2.pem "$APK_PATH" "ubuntu@${{ secrets.EC2_HOST }}:/tmp/$APK_BASE"
          ssh -i ~/.ssh/ec2.pem "ubuntu@${{ secrets.EC2_HOST }}" "sudo bash -s" <<'ENDSSH'
          set -euo pipefail
          mkdir -p /var/www/stock/apk
          PUBLISHED="PUBLISHED_PLACEHOLDER"
          APK_BASE="APK_BASE_PLACEHOLDER"
          mv -f "/tmp/$APK_BASE" "/var/www/stock/apk/$PUBLISHED"
          cd /var/www/stock/apk
          sha256sum "$PUBLISHED" > "${PUBLISHED}.sha256"
          ln -sf "$PUBLISHED" app-latest.apk
          ln -sf "${PUBLISHED}.sha256" app-latest.apk.sha256
          chown -R www-data:www-data /var/www/stock/apk
          chmod 0644 /var/www/stock/apk/*
          ENDSSH
